apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: purely-ingress
  namespace: purely
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    argocd.argoproj.io/sync-options: IgnoreExtraneous=true
spec:
  ingressClassName: nginx
  rules:
    - host: PLACEHOLDER_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

    - host: api.PLACEHOLDER_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

    - host: eureka.PLACEHOLDER_DOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: service-registry
                port:
                  number: 8761