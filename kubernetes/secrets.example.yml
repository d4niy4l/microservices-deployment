# External Secrets Operator - Doppler Integration
#
# HOW TO SET UP:
#
# 1. Create a Doppler account at https://doppler.com
#
# 2. Create a project called "purely" in Doppler
#    Create two environments: production, development
#    Create two configs: prd (production), dev (development)
#
# 3. Add these secrets to Doppler in your project config:
#    - MONGODB_USERNAME
#    - MONGODB_PASSWORD
#    - SMTP_SERVER_URL
#    - SMTP_SERVER_PORT
#    - EMAIL_USERNAME
#    - EMAIL_PASSWORD
#
# 4. Create a Doppler Service Token:
#    doppler tokens create purely prd --name "k8s-eso"
#    Copy the token value
#
# 5. Store the Doppler token in Kubernetes:
#    kubectl create secret generic doppler-token \
#      --namespace external-secrets \
#      --from-literal=dopplerToken=<YOUR_DOPPLER_SERVICE_TOKEN>
#
# 6. Apply this ClusterSecretStore:
#    kubectl apply -f kubernetes/eso-clustersecretstore.yml
#
# 7. Apply the ExternalSecret manifests:
#    kubectl apply -f kubernetes/eso-mongodb-secret.yml
#    kubectl apply -f kubernetes/eso-email-secret.yml
#
# The External Secrets Operator will automatically sync secrets from Doppler
# into Kubernetes Secrets. Any changes in Doppler will be reflected in K8s
# within the sync interval (default: 1 hour).
#
# IMPORTANT: The Doppler service token secret (doppler-token) must be created
# BEFORE applying the ClusterSecretStore and ExternalSecret resources.