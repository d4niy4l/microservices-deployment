---
- name: Install ArgoCD and External Secrets Operator on MicroK8s
  hosts: k8s
  become: true

  vars:
    domain: "{{ inventory_hostname }}"
    doppler_token: "{{ doppler_token | default('CHANGE_ME') }}"

  tasks:
    - name: Wait for MicroK8s to be ready
      ansible.builtin.command: microk8s status --wait-ready
      changed_when: false

    - name: Create ArgoCD namespace
      ansible.builtin.command: microk8s kubectl create namespace argocd
      register: argocd_namespace
      failed_when: argocd_namespace.rc != 0 and "AlreadyExists" not in argocd_namespace.stderr
      changed_when: "'created' in argocd_namespace.stdout"

    - name: Create purely namespace
      ansible.builtin.command: microk8s kubectl create namespace purely
      register: purely_namespace
      failed_when: purely_namespace.rc != 0 and "AlreadyExists" not in purely_namespace.stderr
      changed_when: "'created' in purely_namespace.stdout"

    - name: Install ArgoCD manifests
      ansible.builtin.command: microk8s kubectl create -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
      register: argocd_apply
      failed_when: argocd_apply.rc != 0 and "AlreadyExists" not in argocd_apply.stderr and "already exists" not in argocd_apply.stderr
      changed_when: "'created' in argocd_apply.stdout"

    - name: Install Helm if missing
      ansible.builtin.shell: |
        set -e
        if ! command -v helm >/dev/null 2>&1; then
          snap install helm --classic
        fi
      args:
        executable: /bin/bash

    - name: Add External Secrets Helm repo
      ansible.builtin.command: helm repo add external-secrets https://charts.external-secrets.io
      register: eso_repo_add
      failed_when: eso_repo_add.rc != 0 and "already exists" not in eso_repo_add.stderr
      changed_when: "'has been added' in eso_repo_add.stdout"

    - name: Update Helm repos
      ansible.builtin.command: helm repo update
      changed_when: false

    - name: Install External Secrets Operator
      ansible.builtin.command: helm upgrade --install external-secrets external-secrets/external-secrets --namespace external-secrets --create-namespace
      register: eso_install
      changed_when: "'STATUS: deployed' in eso_install.stdout"

    - name: Wait for External Secrets Operator webhook
      ansible.builtin.command: microk8s kubectl -n external-secrets rollout status deploy/external-secrets-webhook --timeout=120s
      changed_when: false

    - name: Create Doppler token secret for ESO
      ansible.builtin.shell: |
        set -e
        microk8s kubectl create secret generic doppler-token \
          --namespace external-secrets \
          --from-literal=dopplerToken={{ doppler_token }} \
          --dry-run=client -o yaml | microk8s kubectl apply -f -
      args:
        executable: /bin/bash

    - name: Create ArgoCD ingress with domain
      ansible.builtin.shell: |
        cat <<'EOF' | microk8s kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: argocd-server-ingress
          namespace: argocd
          annotations:
            nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
        spec:
          ingressClassName: nginx
          rules:
            - host: argocd.{{ domain }}
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: argocd-server
                        port:
                          number: 443
        EOF
      args:
        executable: /bin/bash
      register: argocd_ingress
      changed_when: "'created' in argocd_ingress.stdout or 'configured' in argocd_ingress.stdout"

    - name: Wait for ArgoCD server deployment to be available
      ansible.builtin.command: microk8s kubectl -n argocd rollout status deploy/argocd-server --timeout=600s
      changed_when: false

    - name: Get ArgoCD initial admin password
      ansible.builtin.command: microk8s kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath={.data.password}
      register: argocd_password_b64
      changed_when: false

    - name: Create ArgoCD Application for purely
      ansible.builtin.shell: |
        cat <<'EOF' | microk8s kubectl apply -f -
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: purely
          namespace: argocd
        spec:
          project: default
          source:
            repoURL: https://github.com/d4niy4l/microservices-deployment.git
            targetRevision: gitops
            path: kubernetes
          destination:
            server: https://kubernetes.default.svc
            namespace: purely
          syncPolicy:
            automated:
              prune: true
              selfHeal: true
            syncOptions:
              - CreateNamespace=false
        EOF
      args:
        executable: /bin/bash
      register: argocd_app
      changed_when: "'created' in argocd_app.stdout or 'configured' in argocd_app.stdout"

    - name: Wait for ingress controller to be ready
      ansible.builtin.shell: |
        microk8s kubectl -n ingress rollout status deploy/nginx-ingress-microk8s-controller --timeout=120s || true
      args:
        executable: /bin/bash
      changed_when: false

    - name: Apply app ingress with domain
      ansible.builtin.shell: |
        cat <<'EOF' | microk8s kubectl apply -f -
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: purely-ingress
          namespace: purely
          annotations:
            nginx.ingress.kubernetes.io/ssl-redirect: "false"
        spec:
          ingressClassName: nginx
          rules:
            - host: {{ domain }}
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: frontend
                        port:
                          number: 80
            - host: api.{{ domain }}
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: api-gateway
                        port:
                          number: 8080
            - host: eureka.{{ domain }}
              http:
                paths:
                  - path: /
                    pathType: Prefix
                    backend:
                      service:
                        name: service-registry
                        port:
                          number: 8761
        EOF
      args:
        executable: /bin/bash
      register: app_ingress
      changed_when: "'created' in app_ingress.stdout or 'configured' in app_ingress.stdout"

    - name: Show ArgoCD access details
      ansible.builtin.debug:
        msg:
          - "==========================================="
          - "ArgoCD URL: https://argocd.{{ domain }}"
          - "Username: admin"
          - "Password: {{ argocd_password_b64.stdout | b64decode }}"
          - "App URL: http://{{ domain }}"
          - "API URL: http://api.{{ domain }}"
          - "Eureka URL: http://eureka.{{ domain }}"
          - "==========================================="