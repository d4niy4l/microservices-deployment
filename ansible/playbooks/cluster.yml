---
- name: Install and configure MicroK8s
  hosts: master
  become: true

  tasks:
    - name: Ensure snap core is installed
      community.general.snap:
        name: core
        state: present

    - name: Ensure snap core is refreshed
      ansible.builtin.command: snap refresh core
      changed_when: false

    - name: Install MicroK8s
      community.general.snap:
        name: microk8s
        classic: true
        state: present

    - name: Add SSH user to microk8s group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: microk8s
        append: true

    - name: Ensure kube config directory exists
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Wait for MicroK8s to be ready
      ansible.builtin.command: microk8s status --wait-ready
      changed_when: false

    - name: Enable core addons
      ansible.builtin.command: "microk8s enable dns hostpath-storage ingress"
      register: microk8s_enable
      changed_when: "'is already enabled' not in microk8s_enable.stdout"

    - name: Write kubeconfig for SSH user
      ansible.builtin.shell: |
        set -e
        microk8s config > /home/{{ ansible_user }}/.kube/config
        chown {{ ansible_user }}:{{ ansible_user }} /home/{{ ansible_user }}/.kube/config
        chmod 0600 /home/{{ ansible_user }}/.kube/config
      args:
        executable: /bin/bash
