---
# configure-workers.yml
# Run after workers are provisioned and added to inventory/hosts.yml
# This playbook joins worker nodes to the MicroK8s cluster
#
# Prerequisites:
#   - Worker nodes must be in inventory/hosts.yml under 'workers' group
#   - The master node must have MicroK8s cluster running
#
# Usage:
#   ansible-playbook playbooks/configure-workers.yml

- name: Add worker nodes to MicroK8s cluster
  hosts: workers
  become: true
  serial: 1

  environment:
    PATH: "/snap/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

  tasks:
    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - net-tools
          - jq
          - conntrack
          - socat
          - iptables
          - docker.io
          - containerd
          - snapd
        state: present

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Ensure containerd service is enabled and running
      ansible.builtin.service:
        name: containerd
        state: started
        enabled: true

    - name: Install snap core
      ansible.builtin.shell: |
        set -e
        snap list core >/dev/null 2>&1 || snap install core
      args:
        executable: /bin/bash

    - name: Refresh snap core
      ansible.builtin.command: snap refresh core
      changed_when: false

    - name: Install MicroK8s
      ansible.builtin.shell: |
        set -e
        snap list microk8s >/dev/null 2>&1 || snap install microk8s --classic
      args:
        executable: /bin/bash

    - name: Add SSH user to microk8s group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: microk8s
        append: true

    - name: Wait for MicroK8s to be ready
      ansible.builtin.shell: microk8s status --wait-ready
      args:
        executable: /bin/bash
      changed_when: false

- name: Generate join token on master and join workers
  hosts: master
  become: true
  environment:
    PATH: "/snap/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  tasks:
    - name: Generate MicroK8s join token
      ansible.builtin.shell: microk8s add-node --token-ttl 3600 | head -1
      register: join_command
      changed_when: false

    - name: Store join command
      ansible.builtin.set_fact:
        microk8s_join_command: "{{ join_command.stdout }}"

- name: Join workers to cluster
  hosts: workers
  become: true
  environment:
    PATH: "/snap/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  tasks:
    - name: Join MicroK8s cluster
      ansible.builtin.shell: "{{ hostvars[groups['master'][0]]['microk8s_join_command'] }}"
      args:
        executable: /bin/bash
      changed_when: true