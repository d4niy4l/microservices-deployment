---
# site.yml - Main playbook entry point
#
# Usage:
#   ansible-playbook playbooks/site.yml -e "doppler_token=<your-token>"
#
# Or run individually:
#   ansible-playbook playbooks/cluster.yml
#   ansible-playbook playbooks/configure-master.yml -e "doppler_token=<token>"
#   ansible-playbook playbooks/configure-workers.yml